.bg{

nav{

}

.container{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:0 20px;
}

.head{
    font-size: 24px;
    font-weight: bold;
    color: white;
    font-family:'Lucida Sans', Geneva, Verdana, sans-serif;
}

ul{
    display:flex;
    list-style-type:none;
    gap:20px;
}

ul li a{
    color:white;
    text-decoration: none;
    font-size:18px;
}

/* TITLE */
.title{
    text-align:center;
    font-size:40px;
    color:#0F172A;
    margin-top:40px;
}

/* HEADINGS */
.container2{
    display:flex;
    justify-content:space-around;
    flex-wrap: wrap;
    margin-top:30px;
}

.hd1{
    color:darkred;
    font-size:30px;
}

/* BOX */
.box1{
    margin-top: 30px;
    padding:20px;
    width:300px;
    border: 2px solid rgb(39, 60, 104);
    border-radius: 10px;
    box-shadow: 10px 10px 10px rgb(102, 97, 97);
    background-color:rgb(226, 237, 238);
    text-align:center;
}

.box1 .school{
    font-size:18px;
    font-weight:bold;
    color:crimson;
}

.box1 .details{
    font-size:16px;
    font-weight:bold;
    color:#0F172A;
}

/* RESPONSIVE */
@media (max-width:768px){
    ul{
        flex-direction:column;
        align-items:center;
    }

    .container2{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
